name: CI to Docker Hub

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        mediawiki_version: ['1.46', '1.45', '1.44', '1.43']
        php_version: ['8.4', '8.3', '8.2']
        include:
          # set global default php
          - php_default: '8.2'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate dockerfile
        run: |
          ./generate_dockerfile.sh ${{matrix.mediawiki_version}} ${{matrix.php_version}}

      - name: Retrieve MediaWiki version
        run: |
          source ./helpers.sh
          mw_ref="$(mediawiki_ref ${{matrix.mediawiki_version}})"
          IFS=':' read -r mw_type mw_value mw_sha <<< "$mw_ref"
          echo "MEDIAWIKI_REF_TYPE=${mw_type}" >> $GITHUB_ENV
          if [[ "$mw_type" == "tag" ]]; then
            echo "MEDIAWIKI_FULL_VERSION=${mw_value}" >> $GITHUB_ENV
          else
            echo "MEDIAWIKI_FULL_VERSION=${{matrix.mediawiki_version}}-dev-${mw_sha:0:7}" >> $GITHUB_ENV
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache/${{ matrix.mediawiki_version }}/apache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-


      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}


      - name: set imageRepository
        run: echo "imageRepository=gesinn/mediawiki-base" >> $GITHUB_ENV

      - name: generate tags for image
        run: |
          source ./helpers.sh
          tags="$(generate_tags "${{ env.imageRepository }}" "${{ env.MEDIAWIKI_FULL_VERSION }}" "${{ matrix.mediawiki_version }}" "${{ matrix.php_version }}" "${{ matrix.php_default }}" "${{ env.MEDIAWIKI_REF_TYPE }}")"
          echo "TAGS=${tags}" >> $GITHUB_ENV

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./Dockerfile
          network: host
          allow: network.host
          build-args: |
             CACHEBUST=${{ steps.date.outputs.date }}
          builder: ${{ steps.buildx.outputs.name }}
          push: true
          tags: ${{ env.TAGS }}
          cache-from: type=local,src=/tmp/.buildx-cache/${{ matrix.mediawiki_version }}/php-${{matrix.php_version}}/apache
          cache-to: type=local,dest=/tmp/.buildx-cache/${{ matrix.mediawiki_version }}/php-${{matrix.php_version}}/apache
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
